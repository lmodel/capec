classes:
  AttackPatternCatalog:
    name: AttackPatternCatalog
    definition_uri: https://w3id.org/lmodel/capec/AttackPatternCatalog
    annotations:
      xsd_element:
        tag: xsd_element
        value: Attack_Pattern_Catalog
      xsd_constraint:
        tag: xsd_constraint
        value: uniqueAttackPatternID on Attack_Patterns/Attack_Pattern/@ID; uniqueCategoryID
          on Categories/Category/@ID; uniqueViewID on Views/View/@ID; uniqueReferenceID
          on External_References/External_Reference/@Reference_ID
      view_export_note:
        tag: view_export_note
        value: "View-filtered catalog exports follow the naming convention \"VIEW\
          \ LIST: CAPEC-{ID}: {Name}\" in the Name attribute. These exports are self-contained:\
          \ they include the relevant Attack_Patterns, exactly one View entry (the\
          \ view being exported), the External_References cited by those patterns,\
          \ and \u2014 when applicable \u2014 the Categories that are part of the\
          \ view. Source files for navigation hierarchies, abstraction/status slices,\
          \ thematic views, and vendor taxonomy mappings reside in tests/data/capec/navigation/,\
          \ tests/data/capec/views/, and src/capec/mappings/ respectively."
    description: 'The root element used to hold an enumerated catalog of common attack
      patterns.

      Each catalog can be organized by optional Views and Categories. The catalog
      also

      contains a list of all External_References that may be shared throughout the

      individual attack patterns. The required Name and Version attributes are used
      to

      uniquely identify the catalog. The required Date attribute identifies the date
      when

      this catalog was created or last updated.'
    in_subset:
    - catalog_entries
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - AttackPatternCatalog_name
    - AttackPatternCatalog_version
    - AttackPatternCatalog_entry_date
    - AttackPatternCatalog_attack_patterns
    - AttackPatternCatalog_categories
    - AttackPatternCatalog_views
    - AttackPatternCatalog_external_references
    slot_usage:
      name:
        name: name
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: Name
        description: The name of this catalog, used to uniquely identify it.
        range: string
        required: true
      version:
        name: version
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: Version
        description: The version of this catalog, used to uniquely identify it.
        range: string
        required: true
      entry_date:
        name: entry_date
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: Date
          xsd_type:
            tag: xsd_type
            value: xs:date
        description: The date when this catalog was created or last updated.
        range: date
        required: true
      attack_patterns:
        name: attack_patterns
        annotations:
          xsd_element:
            tag: xsd_element
            value: Attack_Patterns/Attack_Pattern
        description: The collection of attack patterns defined in this catalog.
        range: AttackPattern
        multivalued: true
        inlined_as_list: true
      categories:
        name: categories
        annotations:
          xsd_element:
            tag: xsd_element
            value: Categories/Category
        description: The collection of categories organizing attack patterns in this
          catalog.
        range: Category
        multivalued: true
        inlined_as_list: true
      views:
        name: views
        annotations:
          xsd_element:
            tag: xsd_element
            value: Views/View
        description: The collection of views providing perspectives on the attack
          pattern catalog.
        range: View
        multivalued: true
        inlined_as_list: true
      external_references:
        name: external_references
        annotations:
          xsd_element:
            tag: xsd_element
            value: External_References/External_Reference
        description: The collection of external references shared throughout the catalog
          entries.
        range: ExternalReference
        multivalued: true
        inlined_as_list: true
    class_uri: capec:AttackPatternCatalog
    tree_root: true
  AttackPattern:
    name: AttackPattern
    definition_uri: https://w3id.org/lmodel/capec/AttackPattern
    annotations:
      xsd_type:
        tag: xsd_type
        value: AttackPatternType
      description_note:
        tag: description_note
        value: The required Description element represents a high level description
          of the attack pattern (no longer than a few sentences). The optional Extended_Description
          element provides additional details. Typical_Severity and Likelihood_Of_Attack
          capture average values with the understanding they will not be accurate
          for all attacks.
    description: 'An attack pattern is an abstraction mechanism for helping describe
      how an attack is

      executed. Each pattern defines a challenge that an attacker may face, provides
      a

      description of the common technique(s) used to meet the challenge, and presents

      recommended methods for mitigating an actual attack. Attack patterns help categorize

      attacks in a meaningful way in an effort to provide a coherent way of teaching

      designers and developers how their systems may be attacked and how they can
      effectively

      defend them.'
    in_subset:
    - catalog_entries
    from_schema: https://w3id.org/lmodel/capec
    close_mappings:
    - stix:attack-pattern
    related_mappings:
    - attack:Technique
    - wasc:Threat
    - owasp:Attack
    slots:
    - id
    - name
    - status
    - AttackPattern_description
    - notes
    - content_history
    - references
    - taxonomy_mappings
    - AttackPattern_abstraction
    - AttackPattern_extended_description
    - AttackPattern_alternate_terms
    - AttackPattern_likelihood_of_attack
    - AttackPattern_typical_severity
    - AttackPattern_related_attack_patterns
    - AttackPattern_execution_flow
    - AttackPattern_prerequisites
    - AttackPattern_skills_required
    - AttackPattern_resources_required
    - AttackPattern_indicators
    - AttackPattern_consequences
    - AttackPattern_mitigations
    - AttackPattern_example_instances
    - AttackPattern_related_weaknesses
    slot_usage:
      description:
        name: description
        annotations:
          xsd_element:
            tag: xsd_element
            value: Description
          xsd_type:
            tag: xsd_type
            value: StructuredTextType
        description: 'A high level description of the attack pattern. The description
          should be no

          longer than a few sentences and should include how malicious input is initially

          supplied, the weakness being exploited, and the resulting negative technical

          impact. A full step-by-step description belongs in the Execution_Flow element.'
        range: StructuredText
        required: true
      abstraction:
        name: abstraction
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: Abstraction
        description: The abstraction level for this attack pattern. Defines whether
          this is a Meta, Standard, or Detailed level pattern.
        range: AbstractionEnum
        required: true
      extended_description:
        name: extended_description
        annotations:
          xsd_element:
            tag: xsd_element
            value: Extended_Description
          xsd_type:
            tag: xsd_type
            value: StructuredTextType
        description: Additional details important to this attack pattern beyond what
          is conveyed in the main description, but not necessary to understand the
          fundamental concept.
        range: StructuredText
      alternate_terms:
        name: alternate_terms
        annotations:
          xsd_element:
            tag: xsd_element
            value: Alternate_Terms/Alternate_Term
          xsd_type:
            tag: xsd_type
            value: AlternateTermsType
        description: One or more other names by which this attack pattern may be known.
        range: AlternateTerm
        multivalued: true
        inlined_as_list: true
      likelihood_of_attack:
        name: likelihood_of_attack
        annotations:
          xsd_element:
            tag: xsd_element
            value: Likelihood_Of_Attack
          xsd_type:
            tag: xsd_type
            value: LikelihoodEnumeration
        description: An overall average likelihood value for attacks that leverage
          this attack pattern, with the understanding that it will not be completely
          accurate for all attacks.
        range: LikelihoodEnum
      typical_severity:
        name: typical_severity
        annotations:
          xsd_element:
            tag: xsd_element
            value: Typical_Severity
          xsd_type:
            tag: xsd_type
            value: SeverityEnumeration
        description: An overall average severity value for attacks that leverage this
          attack pattern, with the understanding that it will not be completely accurate
          for all attacks.
        range: SeverityEnum
      related_attack_patterns:
        name: related_attack_patterns
        annotations:
          xsd_element:
            tag: xsd_element
            value: Related_Attack_Patterns/Related_Attack_Pattern
          xsd_type:
            tag: xsd_type
            value: RelatedAttackPatternType
        description: References to other attack patterns that give insight to similar
          items at higher and lower levels of abstraction.
        range: RelatedAttackPattern
        multivalued: true
        inlined_as_list: true
      execution_flow:
        name: execution_flow
        annotations:
          xsd_element:
            tag: xsd_element
            value: Execution_Flow/Attack_Step
          xsd_type:
            tag: xsd_type
            value: ExecutionFlowType
        description: A detailed step-by-step flow of the attack pattern, listing the
          typical steps performed by an adversary when leveraging the given technique.
          Usually only applicable to Detailed abstraction level attack patterns.
        range: AttackStep
        multivalued: true
        inlined_as_list: true
      prerequisites:
        name: prerequisites
        annotations:
          xsd_element:
            tag: xsd_element
            value: Prerequisites/Prerequisite
          xsd_type:
            tag: xsd_type
            value: PrerequisitesType
        description: The conditions that must exist in order for an attack leveraging
          this pattern to succeed.
        range: StructuredText
        multivalued: true
      skills_required:
        name: skills_required
        annotations:
          xsd_element:
            tag: xsd_element
            value: Skills_Required/Skill
          xsd_type:
            tag: xsd_type
            value: SkillsType
        description: The level of skills or specific knowledge needed by an adversary
          to execute this type of attack.
        range: Skill
        multivalued: true
        inlined_as_list: true
      resources_required:
        name: resources_required
        annotations:
          xsd_element:
            tag: xsd_element
            value: Resources_Required/Resource
          xsd_type:
            tag: xsd_type
            value: RequiredResourcesType
        description: The resources (e.g., CPU cycles, IP addresses, tools) required
          by an adversary to effectively execute this type of attack.
        range: StructuredText
        multivalued: true
      indicators:
        name: indicators
        annotations:
          xsd_element:
            tag: xsd_element
            value: Indicators/Indicator
          xsd_type:
            tag: xsd_type
            value: IndicatorsType
        description: Activities, events, conditions or behaviors that may indicate
          that an attack leveraging this pattern is imminent, in progress, or has
          occurred.
        range: StructuredText
        multivalued: true
      consequences:
        name: consequences
        annotations:
          xsd_element:
            tag: xsd_element
            value: Consequences/Consequence
          xsd_type:
            tag: xsd_type
            value: ConsequencesType
        description: Individual consequences associated with this attack pattern,
          specifying the security properties violated, technical impacts, and likelihoods.
        range: Consequence
        multivalued: true
        inlined_as_list: true
      mitigations:
        name: mitigations
        annotations:
          xsd_element:
            tag: xsd_element
            value: Mitigations/Mitigation
          xsd_type:
            tag: xsd_type
            value: MitigationsType
        description: Actions or approaches to prevent or mitigate the risk of an attack
          that leverages this attack pattern, aimed at improving system resiliency,
          reducing attack surface, or reducing impact.
        range: StructuredText
        multivalued: true
      example_instances:
        name: example_instances
        annotations:
          xsd_element:
            tag: xsd_element
            value: Example_Instances/Example
          xsd_type:
            tag: xsd_type
            value: ExampleInstancesType
        description: One or more concrete example instances of this attack pattern
          to help the reader understand its nature, context, and variability in practical
          terms.
        range: StructuredText
        multivalued: true
      related_weaknesses:
        name: related_weaknesses
        annotations:
          xsd_element:
            tag: xsd_element
            value: Related_Weaknesses/Related_Weakness
          xsd_type:
            tag: xsd_type
            value: RelatedWeaknessesType
        description: References to CWE weaknesses associated with this attack pattern.
          Any of the weaknesses (not necessarily all) may be present for the attack
          to be successful.
        range: integer
        multivalued: true
        inlined_as_list: true
    class_uri: capec:AttackPattern
  Category:
    name: Category
    definition_uri: https://w3id.org/lmodel/capec/Category
    annotations:
      xsd_type:
        tag: xsd_type
        value: CategoryType
    description: 'A category in CAPEC is a collection of attack patterns based on
      some common

      characteristic. More specifically, it is an aggregation of attack patterns based
      on

      effect/intent (as opposed to actions or mechanisms, which would be a meta attack

      pattern). An aggregation based on effect/intent is not an actionable attack
      and as

      such is not a pattern of attack behavior. Rather, it is a grouping of patterns
      based

      on some common criteria.'
    in_subset:
    - catalog_entries
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - id
    - name
    - status
    - notes
    - content_history
    - references
    - taxonomy_mappings
    - Category_summary
    - Category_relationships
    slot_usage:
      summary:
        name: summary
        annotations:
          xsd_element:
            tag: xsd_element
            value: Summary
          xsd_type:
            tag: xsd_type
            value: StructuredTextType
        description: A short summary limited to the key points that define this category.
        range: StructuredText
        required: true
      relationships:
        name: relationships
        annotations:
          xsd_element:
            tag: xsd_element
            value: Relationships
          xsd_type:
            tag: xsd_type
            value: RelationshipsType
        description: Relationships of this category with attack patterns, other categories,
          and views, including Member_Of and Has_Member relationships.
        range: Relationships
        inlined: true
    class_uri: capec:Category
  View:
    name: View
    definition_uri: https://w3id.org/lmodel/capec/View
    annotations:
      xsd_type:
        tag: xsd_type
        value: ViewType
      notes:
        tag: notes
        value: Members of a view are either defined externally through Member_Of relationships
          (for graphs and explicit slices) or by the optional Filter element as an
          XSL query (for implicit slices).
    description: 'A view in CAPEC represents a perspective with which one might look
      at the collection

      of attack patterns defined within CAPEC. There are three different types of
      views as

      defined by the Type attribute: graphs, explicit slices, and implicit slices.'
    in_subset:
    - catalog_entries
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - id
    - name
    - status
    - View_type
    - notes
    - content_history
    - references
    - View_objective
    - View_audience
    - View_members
    - View_filter
    slot_usage:
      type:
        name: type
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: Type
        description: Describes how this view is constructed. Please refer to ViewTypeEnum
          for a list of valid values and their meanings.
        range: ViewTypeEnum
        required: true
      objective:
        name: objective
        annotations:
          xsd_element:
            tag: xsd_element
            value: Objective
          xsd_type:
            tag: xsd_type
            value: StructuredTextType
        description: Describes the perspective from which this view has been constructed
          and what purpose it serves for its intended audience.
        range: StructuredText
        required: true
      audience:
        name: audience
        annotations:
          xsd_element:
            tag: xsd_element
            value: Audience/Stakeholder
          xsd_type:
            tag: xsd_type
            value: AudienceType
        description: Reference to the target stakeholders or groups for whom this
          view is most relevant, along with descriptions of what properties they may
          find useful.
        range: Stakeholder
        multivalued: true
        inlined_as_list: true
      members:
        name: members
        annotations:
          xsd_element:
            tag: xsd_element
            value: Members
          xsd_type:
            tag: xsd_type
            value: RelationshipsType
        description: The members of this view, defined via Member_Of and Has_Member
          relationships (applicable to graph and explicit slice view types).
        range: Relationships
        inlined: true
      filter:
        name: filter
        annotations:
          xsd_element:
            tag: xsd_element
            value: Filter
          xsd_type:
            tag: xsd_type
            value: xs:string
        description: An XSL query used to identify which attack patterns are members
          of this view. Only applicable to implicit slice view types.
        range: string
    class_uri: capec:View
  ExternalReference:
    name: ExternalReference
    definition_uri: https://w3id.org/lmodel/capec/ExternalReference
    annotations:
      xsd_type:
        tag: xsd_type
        value: ExternalReferenceType
      notes:
        tag: notes
        value: The Author and Title elements should be filled in for all references
          if possible. URL and URL_Date are used for web references. Publication_Year
          must follow YYYY format; Publication_Month must follow --MM format; Publication_Day
          must follow ---DD format.
    description: 'An external reference provides a pointer to where more information
      and deeper insight

      can be obtained about an attack pattern, category, or view. Examples include
      research

      papers and excerpts from publications. Not all elements need to be used since
      some are

      designed for web references and others for book references.'
    in_subset:
    - catalog_entries
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - ExternalReference_reference_id
    - ExternalReference_authors
    - ExternalReference_title
    - ExternalReference_edition
    - ExternalReference_publication
    - ExternalReference_publication_year
    - ExternalReference_publication_month
    - ExternalReference_publication_day
    - ExternalReference_publisher
    - ExternalReference_url
    - ExternalReference_url_date
    slot_usage:
      reference_id:
        name: reference_id
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: Reference_ID
        description: A globally unique identifier for this external reference (e.g.,
          REF-1). Used by other entries to link to this reference using formats like
          [REF-1].
        identifier: true
        range: string
        required: true
      authors:
        name: authors
        annotations:
          xsd_element:
            tag: xsd_element
            value: Author
        description: The author(s) of the referenced material.
        range: string
        multivalued: true
      title:
        name: title
        annotations:
          xsd_element:
            tag: xsd_element
            value: Title
        description: The title of the referenced material.
        range: string
        required: true
      edition:
        name: edition
        annotations:
          xsd_element:
            tag: xsd_element
            value: Edition
        description: The edition of the material being referenced, in the event that
          multiple editions of the material exist.
        range: string
      publication:
        name: publication
        annotations:
          xsd_element:
            tag: xsd_element
            value: Publication
        description: The name of the magazine, journal, or other publication that
          contains the referenced material.
        range: string
      publication_year:
        name: publication_year
        annotations:
          xsd_element:
            tag: xsd_element
            value: Publication_Year
          xsd_type:
            tag: xsd_type
            value: xs:gYear
        description: The year of publication of the referenced material. Must follow
          the YYYY format (xs:gYear).
        range: string
      publication_month:
        name: publication_month
        annotations:
          xsd_element:
            tag: xsd_element
            value: Publication_Month
          xsd_type:
            tag: xsd_type
            value: xs:gMonth
        description: The month of publication of the referenced material. Must follow
          the --MM format (xs:gMonth).
        range: string
      publication_day:
        name: publication_day
        annotations:
          xsd_element:
            tag: xsd_element
            value: Publication_Day
          xsd_type:
            tag: xsd_type
            value: xs:gDay
        description: The day of publication of the referenced material. Must follow
          the ---DD format (xs:gDay).
        range: string
      publisher:
        name: publisher
        annotations:
          xsd_element:
            tag: xsd_element
            value: Publisher
        description: The name of the publisher of the referenced material.
        range: string
      url:
        name: url
        annotations:
          xsd_element:
            tag: xsd_element
            value: URL
          xsd_type:
            tag: xsd_type
            value: xs:anyURI
        description: A URL for the material being referenced, if one exists online.
        range: Uri
      url_date:
        name: url_date
        annotations:
          xsd_element:
            tag: xsd_element
            value: URL_Date
          xsd_type:
            tag: xsd_type
            value: xs:date
        description: The date when the URL was validated to be accessible and correct.
        range: date
    class_uri: capec:ExternalReference
  AlternateTerm:
    name: AlternateTerm
    definition_uri: https://w3id.org/lmodel/capec/AlternateTerm
    annotations:
      xsd_type:
        tag: xsd_type
        value: AlternateTermsType/Alternate_Term (inline)
    description: Another name or term used to describe an attack pattern. Provides
      context for the alternate term by which the attack pattern may be known.
    in_subset:
    - attack_pattern_content
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - AlternateTerm_description
    - AlternateTerm_term
    slot_usage:
      description:
        name: description
        annotations:
          xsd_element:
            tag: xsd_element
            value: Description
          xsd_type:
            tag: xsd_type
            value: StructuredTextType
        description: Context and explanation for each alternate term by which this
          attack pattern may be known.
        range: StructuredText
      term:
        name: term
        annotations:
          xsd_element:
            tag: xsd_element
            value: Term
        description: The actual alternate term or name for the attack pattern.
        range: string
        required: true
    class_uri: capec:AlternateTerm
  Consequence:
    name: Consequence
    definition_uri: https://w3id.org/lmodel/capec/Consequence
    annotations:
      xsd_type:
        tag: xsd_type
        value: ConsequencesType/Consequence (inline)
      notes:
        tag: notes
        value: The optional Consequence_ID attribute is used internally by the CAPEC
          team to uniquely identify consequences repeated across patterns. The identifier
          format is CC-N (e.g., CC-1).
    description: 'An individual consequence associated with an attack pattern, specifying
      which

      security properties are violated, the technical impact that arises if an adversary

      succeeds, the likelihood of this specific consequence occurring, and any additional

      commentary.'
    in_subset:
    - attack_pattern_content
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - Consequence_consequence_id
    - Consequence_scope
    - Consequence_impact
    - Consequence_likelihood
    - Consequence_note
    slot_usage:
      consequence_id:
        name: consequence_id
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: Consequence_ID
        description: 'Internal CAPEC team identifier for consequences that repeat
          across many individual patterns. Used to keep repeated consequences synchronized.
          Format: CC-N (e.g., CC-1).'
        range: string
      scope:
        name: scope
        annotations:
          xsd_element:
            tag: xsd_element
            value: Scope
          xsd_type:
            tag: xsd_type
            value: ScopeEnumeration
        description: Identifies the security property or properties that are violated
          when this consequence occurs. Multiple scopes may apply simultaneously.
        range: ScopeEnum
        required: true
        multivalued: true
      impact:
        name: impact
        annotations:
          xsd_element:
            tag: xsd_element
            value: Impact
          xsd_type:
            tag: xsd_type
            value: TechnicalImpactEnumeration
        description: Describes the negative technical impact(s) that arise if an adversary
          successfully achieves this consequence.
        range: TechnicalImpactEnum
        multivalued: true
      likelihood:
        name: likelihood
        annotations:
          xsd_element:
            tag: xsd_element
            value: Likelihood
          xsd_type:
            tag: xsd_type
            value: LikelihoodEnumeration
        description: Identifies how likely this specific consequence is expected to
          be seen relative to the other consequences of the same attack pattern.
        range: LikelihoodEnum
      note:
        name: note
        annotations:
          xsd_element:
            tag: xsd_element
            value: Note
          xsd_type:
            tag: xsd_type
            value: StructuredTextType
        description: Additional commentary about this specific consequence.
        range: StructuredText
    class_uri: capec:Consequence
  Skill:
    name: Skill
    definition_uri: https://w3id.org/lmodel/capec/Skill
    annotations:
      xsd_type:
        tag: xsd_type
        value: SkillsType/Skill (inline simpleContent extension)
    description: A description of the level of skills or specific knowledge needed
      by an adversary to execute this type of attack. Each skill entry captures both
      the skill level and a textual description of the knowledge required.
    in_subset:
    - attack_pattern_content
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - Skill_description
    - Skill_level
    slot_usage:
      description:
        name: description
        annotations:
          xsd_type:
            tag: xsd_type
            value: xs:string (simpleContent base)
        description: Textual description of the specific skills or knowledge the adversary
          must possess to execute this attack at the given skill level.
        range: string
        required: true
      level:
        name: level
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: Level
          xsd_type:
            tag: xsd_type
            value: SkillLevelEnumeration
        description: The skill or knowledge level required (High, Medium, Low, or
          Unknown).
        range: SkillLevelEnum
        required: true
    class_uri: capec:Skill
  Note:
    name: Note
    definition_uri: https://w3id.org/lmodel/capec/Note
    annotations:
      xsd_type:
        tag: xsd_type
        value: NotesType/Note (inline complexContent extension of StructuredTextType)
    description: An additional comment about a CAPEC entry that cannot be captured
      using the other available elements. Each note has a type indicating its purpose
      and contains content describing the note.
    in_subset:
    - attack_pattern_content
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - Note_type
    - Note_content
    slot_usage:
      type:
        name: type
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: Type
          xsd_type:
            tag: xsd_type
            value: NoteTypeEnumeration
        description: The type of note, indicating its purpose (Maintenance, Relationship,
          Research Gap, Terminology, or Other).
        range: NoteTypeEnum
        required: true
      content:
        name: content
        annotations:
          xsd_type:
            tag: xsd_type
            value: StructuredTextType (complexContent base)
        description: The content of the note, potentially containing XHTML markup.
        range: StructuredText
        required: true
    class_uri: capec:Note
  AttackStep:
    name: AttackStep
    definition_uri: https://w3id.org/lmodel/capec/AttackStep
    annotations:
      xsd_type:
        tag: xsd_type
        value: ExecutionFlowType/Attack_Step (inline)
    description: 'An individual step in the execution flow of an attack pattern. Provides
      a detailed

      description of a specific action typically performed by an adversary during
      the

      attack, along with the phase of the attack it belongs to and any specific techniques

      used.'
    in_subset:
    - execution_flow_types
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - AttackStep_description
    - AttackStep_step
    - AttackStep_phase
    - AttackStep_techniques
    slot_usage:
      description:
        name: description
        annotations:
          xsd_element:
            tag: xsd_element
            value: Description
          xsd_type:
            tag: xsd_type
            value: StructuredTextType
        description: A description of the actions taken by the adversary during this
          step of the attack.
        range: StructuredText
        required: true
      step:
        name: step
        annotations:
          xsd_element:
            tag: xsd_element
            value: Step
          xsd_type:
            tag: xsd_type
            value: xs:integer
        description: The sequential step number within the execution flow.
        range: integer
        required: true
      phase:
        name: phase
        annotations:
          xsd_element:
            tag: xsd_element
            value: Phase
        description: The phase of the attack this step belongs to (Explore, Experiment,
          or Exploit).
        range: AttackStepPhaseEnum
        required: true
      techniques:
        name: techniques
        annotations:
          xsd_element:
            tag: xsd_element
            value: Technique
        description: Specific techniques used by the adversary during this attack
          step.
        range: Technique
        multivalued: true
        inlined_as_list: true
    class_uri: capec:AttackStep
  Technique:
    name: Technique
    definition_uri: https://w3id.org/lmodel/capec/Technique
    annotations:
      xsd_type:
        tag: xsd_type
        value: ExecutionFlowType/Attack_Step/Technique (inline complexContent extension
          of StructuredTextType)
    description: A specific technique used by an adversary during an attack step.
      Extends the structured text description with an optional reference to a related
      CAPEC entry.
    in_subset:
    - execution_flow_types
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - Technique_capec_id
    - Technique_description
    slot_usage:
      capec_id:
        name: capec_id
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: CAPEC_ID
          xsd_type:
            tag: xsd_type
            value: xs:string
        description: Optional reference to a related CAPEC entry ID relevant to this
          technique.
        range: string
      description:
        name: description
        annotations:
          xsd_type:
            tag: xsd_type
            value: StructuredTextType (complexContent base)
        description: Description of the specific technique, potentially containing
          XHTML markup.
        range: StructuredText
        required: true
    class_uri: capec:Technique
  RelatedAttackPattern:
    name: RelatedAttackPattern
    definition_uri: https://w3id.org/lmodel/capec/RelatedAttackPattern
    annotations:
      xsd_type:
        tag: xsd_type
        value: RelatedAttackPatternType/Related_Attack_Pattern (inline)
    description: 'A reference to another attack pattern that provides insight to similar
      items at

      higher or lower levels of abstraction, or items that are part of a chaining
      or

      peer relationship. Special cases may require Exclude_Related elements to capture

      ancestor IDs for which this relationship is not applicable.'
    in_subset:
    - relationship_types
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - RelatedAttackPattern_capec_id
    - RelatedAttackPattern_exclude_related
    - RelatedAttackPattern_nature
    slot_usage:
      capec_id:
        name: capec_id
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: CAPEC_ID
          xsd_type:
            tag: xsd_type
            value: xs:integer
        description: The unique CAPEC integer identifier of the related attack pattern.
        range: integer
        required: true
      exclude_related:
        name: exclude_related
        annotations:
          xsd_element:
            tag: xsd_element
            value: Exclude_Related
          xsd_type:
            tag: xsd_type
            value: ExcludeRelatedType
        description: One or more CAPEC identifiers of ancestors for which this relationship
          is not applicable (special cases only).
        range: ExcludeRelated
        multivalued: true
        inlined_as_list: true
      nature:
        name: nature
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: Nature
          xsd_type:
            tag: xsd_type
            value: RelatedNatureEnumeration
        description: The nature of the relationship (ChildOf, ParentOf, CanFollow,
          CanPrecede, CanAlsoBe, or PeerOf).
        range: RelatedNatureEnum
        required: true
    class_uri: capec:RelatedAttackPattern
  ExcludeRelated:
    name: ExcludeRelated
    definition_uri: https://w3id.org/lmodel/capec/ExcludeRelated
    annotations:
      xsd_type:
        tag: xsd_type
        value: ExcludeRelatedType
    description: 'Captures the CAPEC identifier of an ancestor for which a given relationship
      is

      not applicable. Used in special cases within RelatedAttackPattern and relationship

      entries.'
    in_subset:
    - relationship_types
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - ExcludeRelated_exclude_id
    slot_usage:
      exclude_id:
        name: exclude_id
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: Exclude_ID
          xsd_type:
            tag: xsd_type
            value: xs:integer
        description: The CAPEC integer identifier of the ancestor entry for which
          the relationship is not applicable.
        range: integer
        required: true
    class_uri: capec:ExcludeRelated
  RelatedWeakness:
    name: RelatedWeakness
    definition_uri: https://w3id.org/lmodel/capec/RelatedWeakness
    annotations:
      xsd_type:
        tag: xsd_type
        value: RelatedWeaknessesType/Related_Weakness (inline)
    description: 'A reference to a CWE (Common Weakness Enumeration) weakness associated
      with an

      attack pattern. The association implies a weakness that must exist for a given

      attack to be successful. If multiple weaknesses are listed, any of them (but
      not

      necessarily all) may be present for the attack to succeed.'
    in_subset:
    - relationship_types
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - RelatedWeakness_cwe_id
    slot_usage:
      cwe_id:
        name: cwe_id
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: CWE_ID
          xsd_type:
            tag: xsd_type
            value: xs:integer
        description: 'The CWE integer identifier of the related weakness (e.g., 79
          for CWE-79: Improper Neutralization of Input During Web Page Generation).'
        range: integer
        required: true
    class_uri: capec:RelatedWeakness
  Relationships:
    name: Relationships
    definition_uri: https://w3id.org/lmodel/capec/Relationships
    annotations:
      xsd_type:
        tag: xsd_type
        value: RelationshipsType
    description: 'A container for relationships associated with a category or view,
      showing

      Member_Of relationships with views or categories and Has_Member relationships

      with attack patterns or categories.'
    in_subset:
    - relationship_types
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - Relationships_member_of
    - Relationships_has_member
    slot_usage:
      member_of:
        name: member_of
        annotations:
          xsd_element:
            tag: xsd_element
            value: Member_Of
        description: Member_Of relationships showing that this category or view is
          a member of a given view or parent category, identified by CAPEC_ID.
        range: MemberOf
        multivalued: true
        inlined_as_list: true
      has_member:
        name: has_member
        annotations:
          xsd_element:
            tag: xsd_element
            value: Has_Member
        description: Has_Member relationships showing that this category or view contains
          a given attack pattern or category as a member, identified by CAPEC_ID.
        range: HasMember
        multivalued: true
        inlined_as_list: true
    class_uri: capec:Relationships
  MemberOf:
    name: MemberOf
    definition_uri: https://w3id.org/lmodel/capec/MemberOf
    annotations:
      xsd_type:
        tag: xsd_type
        value: RelationshipsType/Member_Of (inline)
    description: 'Represents a Member_Of relationship indicating that the parent category
      or view

      is a member of the specified view or parent category.'
    in_subset:
    - relationship_types
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - MemberOf_capec_id
    - MemberOf_exclude_related
    slot_usage:
      capec_id:
        name: capec_id
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: CAPEC_ID
          xsd_type:
            tag: xsd_type
            value: xs:integer
        description: The CAPEC integer identifier of the target view or category that
          this entry is a member of.
        range: integer
        required: true
      exclude_related:
        name: exclude_related
        annotations:
          xsd_element:
            tag: xsd_element
            value: Exclude_Related
          xsd_type:
            tag: xsd_type
            value: ExcludeRelatedType
        description: CAPEC identifiers of ancestors for which this Member_Of relationship
          is not applicable (special cases only).
        range: ExcludeRelated
        multivalued: true
        inlined_as_list: true
    class_uri: capec:MemberOf
  HasMember:
    name: HasMember
    definition_uri: https://w3id.org/lmodel/capec/HasMember
    annotations:
      xsd_type:
        tag: xsd_type
        value: RelationshipsType/Has_Member (inline)
    description: 'Represents a Has_Member relationship indicating that the parent
      category or view

      contains the specified attack pattern or category as a member.'
    in_subset:
    - relationship_types
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - HasMember_capec_id
    - HasMember_exclude_related
    slot_usage:
      capec_id:
        name: capec_id
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: CAPEC_ID
          xsd_type:
            tag: xsd_type
            value: xs:integer
        description: The CAPEC integer identifier of the attack pattern or category
          that is a member of this entry.
        range: integer
        required: true
      exclude_related:
        name: exclude_related
        annotations:
          xsd_element:
            tag: xsd_element
            value: Exclude_Related
          xsd_type:
            tag: xsd_type
            value: ExcludeRelatedType
        description: CAPEC identifiers of ancestors for which this Has_Member relationship
          is not applicable (special cases only).
        range: ExcludeRelated
        multivalued: true
        inlined_as_list: true
    class_uri: capec:HasMember
  Reference:
    name: Reference
    definition_uri: https://w3id.org/lmodel/capec/Reference
    annotations:
      xsd_type:
        tag: xsd_type
        value: ReferencesType/Reference (inline)
      notes:
        tag: notes
        value: Text or quotes within an entry can cite the External_Reference_ID using
          the format [REF-N] as a footnote-style citation.
    description: 'A link from a CAPEC entry to an external reference defined within
      the catalog.

      The External_Reference_ID identifies which external reference is being cited.

      An optional Section captures a specific section title or page number relevant

      to this use of the reference.'
    in_subset:
    - relationship_types
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - Reference_external_reference_id
    - Reference_section
    slot_usage:
      external_reference_id:
        name: external_reference_id
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: External_Reference_ID
          xsd_type:
            tag: xsd_type
            value: xs:string
        description: The identifier of the external reference entry being linked to
          (e.g., REF-1). Must match a Reference_ID in the catalog's External_References.
        range: string
        required: true
      section:
        name: section
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: Section
          xsd_type:
            tag: xsd_type
            value: xs:string
        description: A specific section title or page number within the referenced
          material that is particularly relevant to this use of the reference.
        range: string
    class_uri: capec:Reference
  TaxonomyMapping:
    name: TaxonomyMapping
    definition_uri: https://w3id.org/lmodel/capec/TaxonomyMapping
    annotations:
      xsd_type:
        tag: xsd_type
        value: TaxonomyMappingsType/Taxonomy_Mapping (inline)
    description: 'A mapping from a CAPEC entry (AttackPattern or Category) to an equivalent
      or related

      entry in a different security taxonomy. Identifies the external taxonomy, the
      ID and

      name of the external entry, and how closely the CAPEC entry aligns with it.'
    in_subset:
    - taxonomy_types
    from_schema: https://w3id.org/lmodel/capec
    slots:
    - TaxonomyMapping_taxonomy_name
    - TaxonomyMapping_entry_id
    - TaxonomyMapping_entry_name
    - TaxonomyMapping_mapping_fit
    slot_usage:
      taxonomy_name:
        name: taxonomy_name
        annotations:
          xsd_attribute:
            tag: xsd_attribute
            value: Taxonomy_Name
          xsd_type:
            tag: xsd_type
            value: TaxonomyNameEnumeration
        description: Identifies the external taxonomy to which this mapping is being
          made.
        range: TaxonomyNameEnum
        required: true
      entry_id:
        name: entry_id
        annotations:
          xsd_element:
            tag: xsd_element
            value: Entry_ID
