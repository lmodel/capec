name: capec
annotations:
  schema:
    tag: schema
    value: Core Attack Pattern
  schema_version:
    tag: schema_version
    value: 3.5.0
  schema_date:
    tag: schema_date
    value: 21 October 2021
  copyright:
    tag: copyright
    value: Copyright (c) 2007-2021, The MITRE Corporation. All rights reserved.
  terms_of_use:
    tag: terms_of_use
    value: http://capec.mitre.org/about/termsofuse.html
  source_namespace:
    tag: source_namespace
    value: http://capec.mitre.org/capec-3
description: 'Common Attack Pattern Enumeration and Classification (CAPEC): A comprehensive
  dictionary

  of known patterns of attack employed by adversaries to exploit known weaknesses
  in

  cyber-enabled capabilities. CAPEC is a community-developed list maintained by The
  MITRE

  Corporation that helps users understand how adversaries exploit weaknesses in applications

  and other cyber-enabled capabilities. The schema is maintained by The MITRE Corporation

  and developed in partnership with the public CAPEC Community.'
title: 'Common Attack Pattern Enumeration and Classification (CAPEC): LinkML Schema'
source: https://capec.mitre.org/data/xsd/ap_schema_latest.xsd
see_also:
- https://lmodel.github.io/capec
- https://capec.mitre.org/
id: https://w3id.org/lmodel/capec
imports:
- linkml:types
license: Apache-2.0
prefixes:
  capec:
    prefix_prefix: capec
    prefix_reference: https://w3id.org/lmodel/capec/
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
  dcterms:
    prefix_prefix: dcterms
    prefix_reference: http://purl.org/dc/terms/
  xsd:
    prefix_prefix: xsd
    prefix_reference: http://www.w3.org/2001/XMLSchema#
  attack:
    prefix_prefix: attack
    prefix_reference: https://attack.mitre.org/
  wasc:
    prefix_prefix: wasc
    prefix_reference: http://projects.webappsec.org/
  owasp:
    prefix_prefix: owasp
    prefix_reference: https://owasp.org/
  stix:
    prefix_prefix: stix
    prefix_reference: https://w3id.org/lmodel/stix/
default_prefix: capec
default_range: string
subsets:
  catalog_entries:
    name: catalog_entries
    definition_uri: https://w3id.org/lmodel/capec/CatalogEntries
    description: Top-level CAPEC catalog entry types (AttackPattern, Category, View,
      ExternalReference) and the catalog container itself.
    from_schema: https://w3id.org/lmodel/capec
  attack_pattern_content:
    name: attack_pattern_content
    definition_uri: https://w3id.org/lmodel/capec/AttackPatternContent
    description: Supporting types used within attack pattern content descriptions,
      including consequence, prerequisite, skill, indicator, and mitigation structures.
    from_schema: https://w3id.org/lmodel/capec
  relationship_types:
    name: relationship_types
    definition_uri: https://w3id.org/lmodel/capec/RelationshipTypes
    description: Types representing relationships between CAPEC entries, including
      related attack patterns, related weaknesses, member-of and has-member relationships.
    from_schema: https://w3id.org/lmodel/capec
  taxonomy_types:
    name: taxonomy_types
    definition_uri: https://w3id.org/lmodel/capec/TaxonomyTypes
    description: Types for mapping CAPEC entries to entries in external security taxonomies
      such as ATT&CK, WASC, and OWASP.
    from_schema: https://w3id.org/lmodel/capec
  content_history_types:
    name: content_history_types
    definition_uri: https://w3id.org/lmodel/capec/ContentHistoryTypes
    description: Types for tracking authorship and modification history of CAPEC entries,
      including submission, modification, and contribution records.
    from_schema: https://w3id.org/lmodel/capec
  execution_flow_types:
    name: execution_flow_types
    definition_uri: https://w3id.org/lmodel/capec/ExecutionFlowTypes
    description: Types for describing the detailed step-by-step execution flow of
      attack patterns, primarily applicable to Detailed abstraction level patterns.
    from_schema: https://w3id.org/lmodel/capec
  audience_types:
    name: audience_types
    definition_uri: https://w3id.org/lmodel/capec/AudienceTypes
    description: Types for describing target stakeholder audiences relevant to CAPEC
      views.
    from_schema: https://w3id.org/lmodel/capec
types:
  Uri:
    name: Uri
    definition_uri: https://w3id.org/lmodel/capec/Uri
    description: URI value represented as a string.
    from_schema: https://w3id.org/lmodel/capec
    base: str
    uri: xsd:anyURI
  StructuredText:
    name: StructuredText
    definition_uri: https://w3id.org/lmodel/capec/StructuredText
    description: 'Mixed content type allowing XHTML content embedded within standard
      string data.

      Some common XHTML elements that may appear: BR for line breaks, UL/LI for bulleted

      lists, OL/LI for numbered lists, and DIV for indented sections.'
    notes:
    - Corresponds to StructuredTextType in the CAPEC XSD which is a mixed complexType
      allowing xs:any elements from the XHTML namespace (xhtml1-strict). In LinkML
      this is represented as a plain string that may contain HTML markup.
    from_schema: https://w3id.org/lmodel/capec
    base: str
    uri: xsd:string
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  AbstractionEnum:
    name: AbstractionEnum
    definition_uri: https://w3id.org/lmodel/capec/AbstractionEnum
    description: 'The different abstraction levels that apply to an attack pattern.
      A Meta level

      attack pattern is a decidedly abstract characterization of a specific methodology

      or technique used in an attack. A Standard level attack pattern is focused on
      a

      specific methodology or technique. A Detailed level attack pattern provides
      a low

      level of detail, typically leveraging a specific technique and targeting a specific

      technology, and expresses a complete execution flow.'
    from_schema: https://w3id.org/lmodel/capec
    permissible_values:
      Meta:
        text: Meta
        description: 'A Meta level attack pattern in CAPEC is a decidedly abstract
          characterization

          of a specific methodology or technique used in an attack. A Meta attack
          pattern

          is often void of a specific technology or implementation and is meant to
          provide

          an understanding of a high level approach. A Meta level attack pattern is
          a

          generalization of related group of standard level attack patterns. Meta
          level

          attack patterns are particularly useful for architecture and design level
          threat

          modeling exercises.'
      Standard:
        text: Standard
        description: 'A Standard level attack pattern in CAPEC is focused on a specific
          methodology

          or technique used in an attack. It is often seen as a singular piece of
          a fully

          executed attack. A Standard attack pattern is meant to provide sufficient
          details

          to understand the specific technique and how it attempts to accomplish a
          desired

          goal. A Standard level attack pattern is a specific type of a more abstract
          meta

          level attack pattern.'
      Detailed:
        text: Detailed
        description: 'A Detailed level attack pattern in CAPEC provides a low level
          of detail, typically

          leveraging a specific technique and targeting a specific technology, and
          expresses

          a complete execution flow. Detailed attack patterns are more specific than
          meta and

          standard attack patterns and often require a specific protection mechanism
          to mitigate

          actual attacks. A Detailed level attack pattern often will leverage a number
          of

          different standard level attack patterns chained together to accomplish
          a goal.'
  AttackStepPhaseEnum:
    name: AttackStepPhaseEnum
    definition_uri: https://w3id.org/lmodel/capec/AttackStepPhaseEnum
    description: The different phases of an individual attack step within the execution
      flow.
    from_schema: https://w3id.org/lmodel/capec
    permissible_values:
      Explore:
        text: Explore
        description: The exploration or reconnaissance phase of the attack.
      Experiment:
        text: Experiment
        description: The experimentation or testing phase of the attack.
      Exploit:
        text: Exploit
        description: The exploitation phase of the attack where intent is realized.
  ContributionTypeEnum:
    name: ContributionTypeEnum
    definition_uri: https://w3id.org/lmodel/capec/ContributionTypeEnum
    description: The type of contribution made to a CAPEC entry.
    from_schema: https://w3id.org/lmodel/capec
    permissible_values:
      Content:
        text: Content
        description: The contribution consisted of actual content donated to the entry.
      Feedback:
        text: Feedback
        description: The contribution consisted of general feedback about the entry.
  ImportanceEnum:
    name: ImportanceEnum
    definition_uri: https://w3id.org/lmodel/capec/ImportanceEnum
    description: Different values for the importance of a modification to CAPEC content.
    from_schema: https://w3id.org/lmodel/capec
    permissible_values:
      Normal:
        text: Normal
        description: Normal importance modification that does not significantly alter
          meaning.
      Critical:
        text: Critical
        description: Critical importance modification that changes the meaning of
          the entry, or how it might be interpreted, bringing it to the attention
          of anyone previously dependent on the attack pattern.
  LikelihoodEnum:
    name: LikelihoodEnum
    definition_uri: https://w3id.org/lmodel/capec/LikelihoodEnum
    description: 'Values corresponding to different likelihoods. The value Unknown
      should be used

      when the actual likelihood of something occurring is not known.'
    from_schema: https://w3id.org/lmodel/capec
    permissible_values:
      High:
        text: High
        description: High likelihood.
      Medium:
        text: Medium
        description: Medium likelihood.
      Low:
        text: Low
        description: Low likelihood.
      Unknown:
        text: Unknown
        description: The likelihood is unknown.
  NoteTypeEnum:
    name: NoteTypeEnum
    definition_uri: https://w3id.org/lmodel/capec/NoteTypeEnum
    description: 'The different types of notes that can be associated with an attack
      pattern.

      A Maintenance note contains significant maintenance tasks within this entry
      that

      still need to be addressed, such as clarifying the concepts involved or improving

      relationships. A Relationship note provides clarifying details regarding the

      relationships between entities. A Research Gap note identifies potential opportunities

      for the research community to conduct further exploration. A Terminology note
      contains

      a discussion of terminology issues related to this attack pattern.'
    from_schema: https://w3id.org/lmodel/capec
    permissible_values:
      Maintenance:
        text: Maintenance
        description: 'Contains significant maintenance tasks within this entry that
          still need to be

          addressed, such as clarifying the concepts involved or improving relationships.'
      Relationship:
        text: Relationship
        description: Provides clarifying details regarding the relationships between
          entities.
      Research Gap:
        text: Research Gap
        description: 'Identifies potential opportunities for the research community
          to conduct further

          exploration of issues related to this attack pattern.'
      Terminology:
        text: Terminology
        description: 'Contains a discussion of terminology issues related to this
          attack pattern,

          or clarifications when there is no established terminology, or if there
          are

          multiple uses of the same key term.'
      Other:
        text: Other
        description: Other note type not covered by the defined categories.
  RelatedNatureEnum:
    name: RelatedNatureEnum
    definition_uri: https://w3id.org/lmodel/capec/RelatedNatureEnum
    description: 'The different values that can be used to define the nature of a
      related attack

      pattern. A ChildOf nature denotes a related attack pattern as a higher level
      of

      abstraction. A ParentOf nature denotes a related attack pattern as a lower level

      of abstraction. The CanPrecede and CanFollow relationships are used to denote

      attack patterns that are part of a chaining structure. The CanAlsoBe relationship

      denotes an attack pattern that, in the proper environment and context, can also
      be

      perceived as the target attack pattern. Note that the CanAlsoBe relationship
      is not

      necessarily reciprocal. The PeerOf relationship is used to show some similarity

      with the target attack pattern which does not fit any of the other types.'
    from_schema: https://w3id.org/lmodel/capec
    permissible_values:
      ChildOf:
        text: ChildOf
        description: Denotes a related attack pattern at a higher level of abstraction;
          the current pattern is a specialization of the related pattern.
      ParentOf:
        text: ParentOf
        description: Denotes a related attack pattern at a lower level of abstraction;
          the current pattern is a generalization of the related pattern.
      CanFollow:
        text: CanFollow
        description: Denotes an attack pattern that can follow (come after) the current
          pattern in a chaining structure.
      CanPrecede:
        text: CanPrecede
        description: Denotes an attack pattern that can precede (come before) the
          current pattern in a chaining structure.
      CanAlsoBe:
        text: CanAlsoBe
        description: 'Denotes an attack pattern that, in the proper environment and
          context, can also

          be perceived as the target attack pattern. Note that the CanAlsoBe relationship

          is not necessarily reciprocal.'
      PeerOf:
        text: PeerOf
        description: 'Used to show some similarity with the target attack pattern
          which does not fit

          any of the other types of relationships.'
  ScopeEnum:
    name: ScopeEnum
    definition_uri: https://w3id.org/lmodel/capec/ScopeEnum
    description: The different areas of software security that can be affected by
      exploiting a weakness.
    from_schema: https://w3id.org/lmodel/capec
    permissible_values:
      Confidentiality:
        text: Confidentiality
        description: The confidentiality security property is violated.
      Integrity:
        text: Integrity
        description: The integrity security property is violated.
      Availability:
        text: Availability
        description: The availability security property is violated.
      Access Control:
        text: Access Control
        description: The access control security property is violated.
      Accountability:
        text: Accountability
        description: The accountability security property is violated.
      Authentication:
        text: Authentication
        description: The authentication security property is violated.
      Authorization:
        text: Authorization
        description: The authorization security property is violated.
      Non-Repudiation:
        text: Non-Repudiation
        description: The non-repudiation security property is violated.
      Other:
        text: Other
        description: Other security property not covered by the defined categories.
  SeverityEnum:
    name: SeverityEnum
    definition_uri: https://w3id.org/lmodel/capec/SeverityEnum
    description: Values corresponding to different severities of attack impact.
    from_schema: https://w3id.org/lmodel/capec
    permissible_values:
      Very High:
        text: Very High
        description: Very high severity impact.
      High:
        text: High
        description: High severity impact.
      Medium:
        text: Medium
        description: Medium severity impact.
      Low:
        text: Low
        description: Low severity impact.
      Very Low:
        text: Very Low
        description: Very low severity impact.
  SkillLevelEnum:
    name: SkillLevelEnum
    definition_uri: https://w3id.org/lmodel/capec/SkillLevelEnum
    description: 'Values corresponding to different knowledge levels required to perform
      an attack.

      The value Unknown should be used when the actual skill level is not known.'
    from_schema: https://w3id.org/lmodel/capec
    permissible_values:
      High:
        text: High
        description: High skill level required to perform the attack.
      Medium:
        text: Medium
        description: Medium skill level required to perform the attack.
      Low:
        text: Low
        description: Low skill level required to perform the attack.
      Unknown:
        text: Unknown
        description: The skill level required to perform the attack is unknown.
  StakeholderEnum:
    name: StakeholderEnum
    definition_uri: https://w3id.org/lmodel/capec/StakeholderEnum
    description: The different types of users and stakeholder groups within the CAPEC
      community.
    from_schema: https://w3id.org/lmodel/capec
    permissible_values:
      Academic Researchers:
        text: Academic Researchers
        description: Academic researchers studying attack patterns and cybersecurity.
      Applied Researchers:
        text: Applied Researchers
        description: Applied researchers using CAPEC for practical security analysis.
      Assessment Customers:
        text: Assessment Customers
        description: Customers who commission security assessments and penetration
          tests.
      Assessment Vendors:
        text: Assessment Vendors
        description: Vendors and consultants who provide security assessment services.
      CAPEC Team:
        text: CAPEC Team
        description: The core CAPEC development and maintenance team at MITRE.
      Educators:
        text: Educators
        description: Educators teaching courses on cybersecurity concepts using CAPEC.
      Information Providers:
        text: Information Providers
        description: Organizations or individuals who provide cybersecurity information
          services.
      Software Customers:
        text: Software Customers
        description: End users and customers of software products concerned about
          security.
      Software Designers:
        text: Software Designers
        description: Software architects and designers involved in secure system design.
      Software Developers:
        text: Software Developers
        description: Software developers building and maintaining secure software.
      Software Vendors:
        text: Software Vendors
        description: Vendors who produce and distribute software products.
      Other:
        text: Other
        description: Other stakeholder type not covered by the defined categories.
  StatusEnum:
    name: StatusEnum
    definition_uri: https://w3id.org/lmodel/capec/StatusEnum
    description: The different status values that an entity (view, category, or attack
      pattern) can have.
    from_schema: https://w3id.org/lmodel/capec
    permissible_values:
      Deprecated:
        text: Deprecated
        description: The entry has been deprecated and should not be used. A placeholder
          for the deprecated entry is left in the catalog and the identifier is not
          reused.
      Draft:
        text: Draft
        description: The entry is a draft and its content may change significantly
          through future revisions as it is reviewed and refined by the community.
      Incomplete:
        text: Incomplete
        description: The entry exists and is partially filled in, but it does not
          yet meet the quality bar established for Usable entries.
      Obsolete:
        text: Obsolete
        description: The entry is obsolete and is no longer recommended for use but
          has not been formally deprecated.
      Stable:
        text: Stable
        description: The entry is stable and unlikely to undergo significant changes
          unless new information or research warrants it.
      Usable:
        text: Usable
        description: The entry is complete enough to be used in product documentation,
          assessments, tools, and mapping exercises without significant risk.
  TaxonomyMappingFitEnum:
    name: TaxonomyMappingFitEnum
    definition_uri: https://w3id.org/lmodel/capec/TaxonomyMappingFitEnum
    description: The different values used to describe how closely a mapping between
      CAPEC and an external taxonomy aligns.
    from_schema: https://w3id.org/lmodel/capec
    permissible_values:
      Exact:
        text: Exact
        description: The CAPEC entry and the external taxonomy entry are an exact
          match in scope and meaning.
      CAPEC More Abstract:
        text: CAPEC More Abstract
        description: The CAPEC entry is more abstract (broader) than the mapped external
          taxonomy entry.
      CAPEC More Specific:
        text: CAPEC More Specific
        description: The CAPEC entry is more specific (narrower) than the mapped external
          taxonomy entry.
      Imprecise:
        text: Imprecise
        description: The mapping between CAPEC and the external taxonomy entry is
          approximate or imprecise.
      Perspective:
        text: Perspective
        description: The CAPEC entry and the external taxonomy entry represent different
          perspectives on the same concept.
  TaxonomyNameEnum:
    name: TaxonomyNameEnum
    definition_uri: https://w3id.org/lmodel/capec/TaxonomyNameEnum
    description: The different known taxonomies to which CAPEC entries can be mapped.
    from_schema: https://w3id.org/lmodel/capec
    permissible_values:
      ATTACK:
        text: ATTACK
        description: The MITRE ATT&CK framework, a globally-accessible knowledge base
          of adversary tactics and techniques.
        exact_mappings:
        - https://attack.mitre.org/
      WASC:
        text: WASC
        description: The Web Application Security Consortium (WASC) Threat Classification
          taxonomy.
        exact_mappings:
        - http://projects.webappsec.org/Threat-Classification
      OWASP Attacks:
        text: OWASP Attacks
        description: The OWASP (Open Web Application Security Project) Attacks taxonomy.
        exact_mappings:
        - https://owasp.org/www-community/attacks/
  TechnicalImpactEnum:
    name: TechnicalImpactEnum
    definition_uri: https://w3id.org/lmodel/capec/TechnicalImpactEnum
    description: 'The different negative technical impacts that can result from a
      successful attack

      leveraging a given attack pattern. A negative technical impact is the specific

      technical effect of successfully violating a reasonable security policy for
      the

      system or network.'
    from_schema: https://w3id.org/lmodel/capec
    permissible_values:
      Modify Data:
        text: Modify Data
        description: The attacker can modify data stored within or processed by the
          target system.
      Read Data:
        text: Read Data
        description: The attacker can read sensitive or confidential data from the
          target system.
      Unreliable Execution:
        text: Unreliable Execution
        description: The execution of the target system becomes unreliable or unpredictable.
      Resource Consumption:
        text: Resource Consumption
        description: Target system resources (CPU, memory, bandwidth) are consumed
          by the attack.
      Execute Unauthorized Commands:
        text: Execute Unauthorized Commands
        description: The attacker can execute unauthorized commands or code on the
          target system.
      Gain Privileges:
        text: Gain Privileges
        description: The attacker gains elevated or unauthorized privileges on the
          target system.
      Bypass Protection Mechanism:
        text: Bypass Protection Mechanism
        description: The attacker can bypass existing security controls or protection
          mechanisms.
      Hide Activities:
        text: Hide Activities
        description: The attacker can conceal malicious activities from detection
          and monitoring.
      Alter Execution Logic:
        text: Alter Execution Logic
        description: The attacker can alter the normal execution logic or control
          flow of the target system.
      Other:
        text: Other
        description: Other technical impact not covered by the defined categories.
  ViewTypeEnum:
    name: ViewTypeEnum
    definition_uri: https://w3id.org/lmodel/capec/ViewTypeEnum
    description: 'The different types of views that can be found within CAPEC. A graph
      is a

      hierarchical representation of attack patterns based on a specific vantage point.

      An explicit slice is a subset of attack patterns related through some external

      factor. An implicit slice is a subset of attack patterns related through a specific

      attribute.'
    from_schema: https://w3id.org/lmodel/capec
    permissible_values:
      Implicit:
        text: Implicit
        description: 'A subset of attack patterns that are related through a specific
          attribute. For

          example, a slice may refer to all attack patterns in draft status, or all
          existing

          meta attack patterns. Members are defined by the Filter element (an XSL
          query).'
      Explicit:
        text: Explicit
        description: 'A subset of attack patterns that are related through some external
          factor. For

          example, a view may represent mappings to external groupings like a Top-N
          list.

          Members are defined externally through Member_Of relationships.'
      Graph:
        text: Graph
        description: 'A hierarchical representation of attack patterns based on a
          specific vantage point

          that a user may take. The hierarchy often starts with a category, followed
          by a

          meta/standard attack pattern, and ends with a detailed attack pattern. Members
          are

          defined through Member_Of relationships on categories.'
slots:
  id:
    name: id
