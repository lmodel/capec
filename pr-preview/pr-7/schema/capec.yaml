      submission:
        name: submission
        annotations:
          xsd_element:
            tag: xsd_element
            value: Submission
        description: Identifies the original submitter, their organization, the submission
          date, and any comments related to the initial entry submission.
        range: Submission
        inlined: true
      modifications:
        name: modifications
        annotations:
          xsd_element:
            tag: xsd_element
            value: Modification
        description: Records of modifications made to the entry content. A new Modification
          entry should exist for each change made.
        range: Modification
        multivalued: true
        inlined_as_list: true
      contributions:
        name: contributions
        annotations:
          xsd_element:
            tag: xsd_element
            value: Contribution
